schema_version: 0.1
status: historical-proof-target
profile:
  id: manager-pilot-code-review-codex-global
  owner: maintainers
  purpose: >
    Historical proof target for the first manager-owned real write. This
    profile is not auto-loaded by default and is retained for audit context.

registry:
  path_hint: ../..
  manifest: ../../skills.registry.yaml

consumer_roots:
  codex_global_manager:
    path: ~/.agents/skills
    adapter: manager-copy
    status: historical-proof-target

selected_skills:
  - skill_id: code-review
    expose_to:
      - codex_global_manager
    state: active

non_goals:
  - installing more than code-review
  - changing ~/.codex/skills
  - changing ~/.claude/skills
  - stale cleanup
