id: skills-registry
proof_kind: code
covers_scenarios: []
covers_boundaries: []
commands:
  - id: shell-syntax
    run: |
      set -e
      for file in scripts/skills_drift_report.sh scripts/test_skills_doctor.sh scripts/test_skills_sync.sh; do
        bash -n "$file"
      done
  - id: ruby-syntax
    run: ruby -c scripts/skills_doctor.rb && ruby -c scripts/skills_sync.rb
  - id: skills-doctor-test
    run: scripts/test_skills_doctor.sh
  - id: skills-sync-test
    run: scripts/test_skills_sync.sh
  - id: sync-plan
    run: scripts/skills_sync.rb --plan --json > "{artifactsDir}/skills-sync-plan.json"
  - id: registry-yaml
    run: |
      ruby -ryaml -e '
        files = ["skills.registry.yaml", *Dir.glob("profiles/**/*.{yaml,yml}")].uniq
        files.each do |file|
          YAML.safe_load(File.read(file), aliases: false)
        end
        puts "registry YAML parsed"
      '
  - id: skill-frontmatter
    run: |
      ruby -ryaml -e '
        files = Dir.glob("*/SKILL.md").sort
        raise "No skill entrypoints found" if files.empty?

        files.each do |file|
          lines = File.readlines(file, chomp: true)
          raise "#{file}: missing YAML front matter" unless lines.first == "---"
          closing = lines[1..]&.index("---")
          raise "#{file}: unterminated YAML front matter" unless closing

          metadata = YAML.safe_load(lines[1, closing].join("\n"), aliases: false) || {}
          ["name", "description"].each do |key|
            raise "#{file}: missing #{key}" if metadata[key].to_s.strip.empty?
          end
        end

        puts "validated #{files.length} skill entrypoints"
      '
  - id: public-safety-docs
    run: |
      ruby -e '
        skill_files = Dir.glob([
          "*/SKILL.md",
          "*/assets/**/*",
          "*/scripts/**/*",
          "*/references/**/*",
          "*/examples/**/*",
          "*/templates/**/*"
        ]).select { |path| File.file?(path) }
        script_fixture_allowlist = %w[
          scripts/test_skills_doctor.sh
          scripts/test_skills_sync.sh
        ]
        script_files = Dir.glob("scripts/**/*").select do |path|
          File.file?(path) && !script_fixture_allowlist.include?(path)
        end
        profile_files = Dir.glob("profiles/**/*.{yaml,yml}")
        agent_files = Dir.glob(".agents/**/*.{yaml,yml}")
        files = [
          "AGENTS.md",
          "README.md",
          "skills.lock.yaml",
          "skills.registry.yaml",
          *agent_files,
          *profile_files,
          *Dir.glob("docs/**/*.{md,yaml,yml}"),
          *script_files,
          *skill_files
        ].uniq.sort
        patterns = {
          "macOS user path" => %r{/Users/[A-Za-z0-9._-]+},
          "Linux user path" => %r{/home/[A-Za-z0-9._-]+},
          "root home path" => %r{/root(?:/|\b)},
          "Windows user path" => %r{[A-Za-z]:[\\/]+Users[\\/]+[^\\/\s]+},
          "mac temp path" => %r{/var/folders/},
          "file URL" => %r{file://},
          "GitHub token" => %r{github_pat_|ghp_|gho_|ghu_|ghs_|ghr_},
          "OpenAI key" => %r{sk-[A-Za-z0-9_-]{20,}},
          "private key" => %r{BEGIN [A-Z ]*PRIVATE KEY}
        }
        failures = []
        files.each do |file|
          next unless File.file?(file)
          text = File.binread(file).force_encoding(Encoding::UTF_8).scrub
          if file == ".agents/verify/skills-registry.yaml"
            # This verifier file carries the regex literals used by the scan.
            # Strip only those pattern-definition lines before matching so the
            # verifier can scan itself without hiding real leaks elsewhere.
            text = text.gsub(/^\s*"[^"]+" => %r\{.*\},?\n?/, "")
          end
          patterns.each do |label, pattern|
            failures << "#{file}: #{label}" if text.match?(pattern)
          end
        end
        abort "public-safety scan failed:\n#{failures.join("\n")}" unless failures.empty?
        puts "public-safety scan ok"
      '
  - id: drift-snapshot
    run: SKILLS_REPORT_SHOW_PATHS=0 PROJECTS_ROOT="$PWD" bash scripts/skills_drift_report.sh > "{artifactsDir}/skill-drift-snapshot.md"
required_artifacts:
  - paths.txt
  - skill-drift-snapshot.md
  - skills-sync-plan.json
required_pass_signals:
  - shell-syntax
  - ruby-syntax
  - skills-doctor-test
  - skills-sync-test
  - sync-plan
  - registry-yaml
  - skill-frontmatter
  - public-safety-docs
  - drift-snapshot
failure_patterns:
  - "error:"
  - "FAIL"
evidence_extractors:
  - artifact-manifest
  - command-stdout
